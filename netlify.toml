# Netlify configuration for full-stack app (Frontend + API via Functions)
[build]
  publish = "client/dist"
  command = "npm ci && npm run build:api && cd client && npm ci && npm run build"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["serverless-http", "express", "cors", "helmet", "compression", "google-play-scraper", "axios", "csv-writer"]

# Redirects are handled by client/public/_redirects file
