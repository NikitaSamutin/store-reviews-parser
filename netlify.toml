# Netlify configuration for frontend only (API is on Railway)
[build]
  base = "client"
  publish = "dist"
  command = "npm ci && npm run build"

[build.environment]
  NODE_VERSION = "20"
  # API URL will be set in Netlify UI as environment variable
  # VITE_API_URL = "https://store-reviews-api-production.up.railway.app/api"

# SPA redirect - all routes go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
