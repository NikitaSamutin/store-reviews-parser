# Netlify configuration for full-stack app (Frontend + API via Functions)
[build]
  base = "client"
  publish = "dist"
  command = "cd .. && npm ci && npm run build:api && cd client && npm ci && npm run build"
  functions = "../netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Redirects are handled by client/public/_redirects file
