# Netlify configuration for full-stack app (Frontend + API via Functions)
[build]
  base = "client"
  publish = "dist"
  command = "cd .. && npm ci && npm run build:api && cd client && npm ci && npm run build"
  functions = "../netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Build API before deploying functions
[build.processing]
  skip_processing = false

# API routes via Netlify Functions (must be BEFORE SPA redirect)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# SPA redirect - all routes go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
