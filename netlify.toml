[build]
  publish = "client/dist"
  # Сборка монорепо: сначала API (для серверлесс-функции), затем фронтенд
  command = "npm ci && npm run build -w store-reviews-parser-server && npm run build -w client"

[build.environment]
  NODE_VERSION = "20"

# Настройка функций Netlify
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # Указываем runtime Node.js 20 для Functions
  [functions.api]
    node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
