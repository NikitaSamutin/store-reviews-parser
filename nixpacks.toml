# Railway Nixpacks конфигурация для API сервиса
# Решение проблемы EBUSY: изменён кэш на /root/.npm вместо /app/node_modules/.cache

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
    "npm ci --prefer-offline --cache /root/.npm"
]

[phases.build]
cmds = [
    "npm run build:api"
]

[start]
cmd = "npm start"
