services:
  # API Backend на Render
  - type: web
    name: store-reviews-api
    runtime: node
    region: frankfurt # EU регион (ближе к России)
    plan: free
    buildCommand: npm ci && cd packages/api && npm install && npm run build
    startCommand: cd packages/api && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /api/health
    
  # Frontend на Render (статика)
  - type: web
    name: store-reviews-frontend
    runtime: static
    buildCommand: npm ci && npm run build -w client
    staticPublishPath: ./client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false # Нужно будет указать URL API после деплоя
